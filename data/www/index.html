<!DOCTYPE html><html><head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>AirPlay 音频接收器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,sans-serif;background:linear-gradient(160deg,#1a1a1a 0%,#2d2d2d 50%,#1f1f1f 100%);min-height:100vh;padding:20px;color:#fff}
.wrap{max-width:500px;margin:0 auto}
.header{text-align:center;padding:36px 0 28px}
.header h1{font-size:30px;font-weight:700;margin-bottom:10px;background:linear-gradient(135deg,#e0e0e0 0%,#a0a0a0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:rgba(255,255,255,0.5);font-size:14px;letter-spacing:1px}
.status-bar{background:rgba(160,160,160,0.1);border:1px solid rgba(160,160,160,0.25);border-radius:14px;padding:16px 20px;margin-bottom:24px;text-align:center;font-size:14px;font-weight:500;transition:all 0.3s}
.status-bar.ok{background:rgba(72,187,120,0.15);border-color:rgba(72,187,120,0.3);color:#68d391}
.status-bar.err{background:rgba(245,101,101,0.15);border-color:rgba(245,101,101,0.3);color:#fc8181}
.card{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px;padding:24px;margin-bottom:18px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 8px 32px rgba(0,0,0,0.2);transition:transform 0.2s,box-shadow 0.2s}
.card:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
.card h2{font-size:15px;font-weight:600;margin-bottom:18px;color:rgba(255,255,255,0.9);display:flex;align-items:center;gap:8px}
.card h2::before{content:'';width:3px;height:16px;background:linear-gradient(180deg,#b0b0b0,#707070);border-radius:2px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:8px;font-weight:500;letter-spacing:0.5px}
input[type=text],input[type=password]{width:100%;padding:13px 16px;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#fff;font-size:14px;transition:border-color 0.2s,box-shadow 0.2s}
input:focus{outline:none;border-color:rgba(180,180,180,0.6);box-shadow:0 0 0 3px rgba(180,180,180,0.12)}
input::placeholder{color:rgba(255,255,255,0.25)}
.btn{display:inline-block;padding:12px 22px;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.25s;text-decoration:none;text-align:center}
.btn-primary{background:linear-gradient(135deg,#6b6b6b 0%,#4a4a4a 100%);color:#fff;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.btn-primary:hover{box-shadow:0 6px 20px rgba(0,0,0,0.5);transform:translateY(-1px)}
.btn-secondary{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.1)}
.btn-secondary:hover{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.2)}
.btn-danger{background:linear-gradient(135deg,#e53e3e 0%,#c53030 100%);color:#fff;box-shadow:0 4px 15px rgba(229,62,62,0.3)}
.btn-danger:hover{box-shadow:0 6px 20px rgba(229,62,62,0.5);transform:translateY(-1px)}
.btn-block{width:100%;margin-top:12px}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.wifi-list{max-height:200px;overflow-y:auto;margin:14px 0;border-radius:10px}
.wifi-list::-webkit-scrollbar{width:4px}
.wifi-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px}
.wifi-item{padding:13px 16px;background:rgba(0,0,0,0.15);margin-bottom:4px;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all 0.2s;border:1px solid transparent}
.wifi-item:hover{background:rgba(180,180,180,0.1);border-color:rgba(180,180,180,0.25)}
.wifi-item.sel{background:rgba(180,180,180,0.15);border-color:rgba(180,180,180,0.4)}
.wifi-item .ssid{font-weight:500;font-size:14px}
.wifi-item .rssi{font-size:12px;color:rgba(255,255,255,0.4)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-item{background:rgba(0,0,0,0.2);padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.05)}
.info-item label{font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-bottom:6px;font-weight:500}
.info-item span{font-size:14px;font-weight:500;color:rgba(255,255,255,0.9)}
.msg{padding:12px 14px;border-radius:8px;margin-top:12px;font-size:13px;font-weight:500;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.msg.ok{background:rgba(72,187,120,0.15);border:1px solid rgba(72,187,120,0.3);color:#68d391}
.msg.err{background:rgba(245,101,101,0.15);border:1px solid rgba(245,101,101,0.3);color:#fc8181}
.msg.info{background:rgba(160,160,160,0.12);border:1px solid rgba(160,160,160,0.3);color:#c0c0c0}
.file-row{display:flex;gap:12px;align-items:center}
.file-name{flex:1;font-size:13px;color:rgba(255,255,255,0.4)}
.actions{display:flex;gap:10px;margin-top:14px}
.card-desc{color:rgba(255,255,255,0.4);font-size:13px;margin-bottom:14px;line-height:1.5}
</style></head><body>
<div class='wrap'>
<div class='header'><h1>AirPlay 音频接收器</h1><p>ESP32 设备配置面板</p></div>
<div id='status-bar' class='status-bar'>正在加载...</div>
<div class='card'><h2>WiFi 网络</h2>
<button class='btn btn-secondary' onclick='scanWiFi()'>扫描网络</button>
<div id='wifi-list' class='wifi-list'></div>
<div class='form-group'><label>网络名称 (SSID)</label><input type='text' id='wifi-ssid' placeholder='输入或选择网络'></div>
<div class='form-group'><label>密码</label><input type='password' id='wifi-pass' placeholder='输入密码'></div>
<button class='btn btn-primary btn-block' onclick='saveWiFi()'>连接 WiFi</button>
<div id='wifi-msg'></div></div>
<div class='card'><h2>设备设置</h2>
<div class='form-group'><label>AirPlay 设备名称</label><input type='text' id='dev-name' placeholder='我的音箱'></div>
<button class='btn btn-primary' onclick='saveName()'>保存名称</button>
<div id='name-msg'></div></div>
<div class='card'><h2>固件升级</h2>
<div class='file-row'><input type='file' id='fw-file' accept='.bin' style='display:none'>
<button class='btn btn-secondary' onclick='document.getElementById("fw-file").click()'>选择文件</button>
<span class='file-name' id='fw-name'>未选择文件</span></div>
<button class='btn btn-primary btn-block' id='ota-btn' onclick='startOTA()' disabled>上传固件</button>
<div id='ota-msg'></div></div>
<div class='card'><h2>系统信息</h2>
<div class='info-grid'>
<div class='info-item'><label>IP 地址</label><span id='info-ip'>-</span></div>
<div class='info-item'><label>MAC 地址</label><span id='info-mac'>-</span></div>
<div class='info-item'><label>设备名称</label><span id='info-name'>-</span></div>
<div class='info-item'><label>可用内存</label><span id='info-heap'>-</span></div>
<div class='info-item'><label>固件版本</label><span id='info-fw'>-</span></div>
<div class='info-item'><label>WiFi 名称</label><span id='info-ssid'>-</span></div>
<div class='info-item'><label>信号强度</label><span id='info-rssi'>-</span></div>
<div class='info-item'><label>WiFi 信道</label><span id='info-chan'>-</span></div>
<div class='info-item'><label>PHY 模式</label><span id='info-phy'>-</span></div>
<div class='info-item' style='grid-column:1/-1'><label>WiFi BSSID</label><span id='info-bssid'>-</span></div>
</div>
<div class='actions'><button class='btn btn-danger' onclick='restart()'>重启设备</button></div>
</div>
<div class='card'><h2>系统日志</h2>
<p class='card-desc'>通过 WebSocket 实时查看 ESP 日志输出</p>
<a href='/logs' class='btn btn-primary'>打开日志</a></div>
<div class='card'><h2>WiFi 测速</h2>
<p class='card-desc'>测量到本设备的延迟和吞吐量</p>
<a href='/speedtest' class='btn btn-primary'>打开测速</a></div>
<div class='card' id='eq-card' style='display:none'><h2>均衡器</h2>
<p class='card-desc'>15 段参量均衡器，用于 DAC 音频调节</p>
<a href='/eq' class='btn btn-primary'>打开均衡器</a></div>
</div>
<script>
function msg(id,txt,type){var e=document.getElementById(id);if(e){e.innerHTML='<div class="msg '+type+'">'+txt+'</div>';setTimeout(function(){e.innerHTML='';},4000);}}
async function scanWiFi(){
  var l=document.getElementById('wifi-list');l.innerHTML='<div class="msg info">正在扫描...</div>';
  try{var r=await fetch('/api/wifi/scan');var d=await r.json();
    if(d.success&&d.networks.length>0){l.innerHTML='';d.networks.forEach(function(n){
      var i=document.createElement('div');i.className='wifi-item';
      i.innerHTML='<span class="ssid">'+n.ssid+'</span><span class="rssi">'+n.rssi+' dBm</span>';
      i.onclick=function(){document.querySelectorAll('.wifi-item').forEach(function(x){x.classList.remove('sel');});i.classList.add('sel');document.getElementById('wifi-ssid').value=n.ssid;};
      l.appendChild(i);});}
    else{l.innerHTML='<div class="msg info">未找到可用网络</div>';}}
  catch(e){l.innerHTML='<div class="msg err">扫描失败</div>';}}
async function saveWiFi(){
  var s=document.getElementById('wifi-ssid').value.trim();var p=document.getElementById('wifi-pass').value;
  if(!s){msg('wifi-msg','请输入网络名称','err');return;}
  try{var r=await fetch('/api/wifi/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ssid:s,password:p})});
    var d=await r.json();if(d.success){msg('wifi-msg','已保存！正在重启...','ok');}else{msg('wifi-msg',d.error,'err');}}
  catch(e){msg('wifi-msg','连接失败','err');}}
async function saveName(){
  var n=document.getElementById('dev-name').value.trim();if(!n){msg('name-msg','请输入名称','err');return;}
  try{var r=await fetch('/api/device/name',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})});
    var d=await r.json();if(d.success){msg('name-msg','已保存！重启后生效','ok');loadInfo();}else{msg('name-msg',d.error,'err');}}
  catch(e){msg('name-msg','保存失败','err');}}
async function startOTA(){
  var f=document.getElementById('fw-file').files[0];if(!f){msg('ota-msg','请选择文件','err');return;}
  document.getElementById('ota-btn').disabled=true;msg('ota-msg','正在上传...','info');
  try{await fetch('/api/ota/update',{method:'POST',headers:{'Content-Type':'application/octet-stream'},body:f});msg('ota-msg','上传完成！正在重启...','ok');}
  catch(e){msg('ota-msg','正在重启...','ok');}}
async function restart(){
  if(!confirm('确定要重启设备吗？'))return;
  try{await fetch('/api/system/restart',{method:'POST'});msg('','正在重启...','info');}catch(e){}}
async function loadInfo(){
  try{var r=await fetch('/api/system/info');var d=await r.json();
    if(d.success){var i=d.info;var b=document.getElementById('status-bar');
      if(i.eth_connected){b.className='status-bar ok';b.innerHTML='&#x2714; 以太网已连接：'+i.ip;}
      else if(i.wifi_connected){b.className='status-bar ok';b.innerHTML='&#x2714; WiFi 已连接：'+i.ip;}
      else{b.className='status-bar err';b.innerHTML='&#x2716; 未连接网络 - 请在下方配置 WiFi';}
      document.getElementById('info-ip').textContent=i.ip||'-';
      document.getElementById('info-mac').textContent=i.mac||'-';
      document.getElementById('info-name').textContent=i.device_name||'-';
      document.getElementById('info-heap').textContent=Math.round(i.free_heap/1024)+' KB';
      document.getElementById('info-fw').textContent=i.firmware_version||'-';
      function rssiLabel(r){if(r==null)return '-';var q='';if(r>=-55)q=' (极好)';else if(r>=-65)q=' (良好)';else if(r>=-75)q=' (一般)';else q=' (较差)';return r+' dBm'+q;}
      document.getElementById('info-ssid').textContent=i.wifi_ssid||'-';
      document.getElementById('info-rssi').textContent=rssiLabel(i.wifi_rssi);
      document.getElementById('info-chan').textContent=i.wifi_channel||'-';
      document.getElementById('info-phy').textContent=i.wifi_phy||'-';
      document.getElementById('info-bssid').textContent=i.wifi_bssid||'-';
      if(i.eq_supported){document.getElementById('eq-card').style.display='';}
      document.getElementById('dev-name').placeholder=i.device_name||'';}}catch(e){}}
window.onload=function(){
  document.getElementById('fw-file').onchange=function(e){var f=e.target.files[0];
    document.getElementById('fw-name').textContent=f?f.name:'未选择文件';
    document.getElementById('ota-btn').disabled=!f;};
  loadInfo();setInterval(loadInfo,30000);};
</script></body></html>
